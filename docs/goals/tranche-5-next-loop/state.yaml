version: 2
goal: tranche-5-next-loop
tasks:
  - id: T001
    type: judge
    assignee: Judge
    status: active
    objective: "Rank remaining backlog ideas for tranche 5 by device-test results, visual impact, reversibility, and hook risk."
    inputs:
      - ../../ideas.md
      - ../../audit.md
    constraints:
      - "Read-only task."
      - "Keep tranche 5 UI/UX-only by default."
    expected_output:
      - "A selected tranche 5 list with implementation notes."
    receipt: null
  - id: T002
    type: worker
    assignee: Worker
    status: queued
    objective: "Implement the approved tranche 5 tweaks and update the local Sileo repo."
    allowed_files:
      - tweaks
      - repo
      - docs
      - scripts
      - shared
    verify:
      - "./scripts/build-all.sh"
      - "./scripts/package-repo.sh"
      - "./scripts/audit-tweaks.sh"
    stop_if:
      - "A selected tweak requires non-UI behavior."
      - "A hook cannot be made defensive."
      - "Build fails twice."
    receipt: null
