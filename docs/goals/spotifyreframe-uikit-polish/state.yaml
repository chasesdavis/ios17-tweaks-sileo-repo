version: 2

goal:
  title: "SpotifyReframe UIKit Polish"
  slug: "spotifyreframe-uikit-polish"
  kind: specific
  tranche: "Stabilize the visible UIKit AI Home launcher, ship a polished 1.3.0 preview pass, and leave a safe 1.4.0 integration plan."
  status: done

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true

agents:
  scout: installed
  worker: installed
  judge: installed

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    objective: "Audit SpotifyReframe 1.2.1 launcher and preview implementation, verification commands, and remaining device-test risks."
    inputs:
      - ../../../tweaks/SpotifyReframe
      - ../../../repo/Packages
      - ../../audit.md
    constraints:
      - "Read-only."
      - "Do not edit implementation files."
      - "Report concrete file paths, package versions, and command evidence."
      - "Call out any possible reason the AI Home launcher might still not appear."
    expected_output:
      - "Implementation map for the launcher and preview."
      - "Verification command list."
      - "Device-test checklist."
      - "Candidate 1.3.0 polish tasks."
    receipt:
      result: done
      summary: "SpotifyReframe 1.2.1 is packaged and live locally with a UIKit AI Home launcher, no SwiftUI/libswift linkage, and a com.spotify.client-only filter. Main residual risk is persisted preferences from 1.2.0: CDPremiumBool uses saved values when present, so a prior false value for homePreviewEnabled/homePreviewLauncher can still hide the launcher until reset or toggled."
      evidence:
        - "repo/Packages: SpotifyReframe Version 1.2.1-1, SHA256 4be658abab61dc9d2658774e542211ed8a06e8107d9b9f525ab522ce2bb3b2c6"
        - "repo/debs/com.chasedavis.spotifyreframe_1.2.1-1_iphoneos-arm64e.deb"
        - "tweaks/SpotifyReframe/Tweak.xm: homePreviewEnabled/homePreviewLauncher fallback YES; launcher applied from viewDidAppear, UIWindow makeKeyAndVisible, UIWindow layoutSubviews, and CDSpotifyReapplyAllWindows"
        - "tweaks/SpotifyReframe/SpotifyUIKitHomePreview.m: UIKit preview implementation"
        - "tweaks/SpotifyReframe/SpotifyReframe.plist: Filter Bundles contains com.spotify.client"
        - "packaged otool -L: UIKit/Foundation/QuartzCore/CoreGraphics/Substrate only; no SwiftUI/libswift"
        - "docs/audit.md: SpotifyReframe static checks pass"
      verification_commands:
        - "plutil -lint tweaks/SpotifyReframe/Resources/Root.plist tweaks/SpotifyReframe/Resources/Info.plist"
        - "plutil -p tweaks/SpotifyReframe/SpotifyReframe.plist"
        - "ar/tar inspect repo/debs/com.chasedavis.spotifyreframe_1.2.1-1_iphoneos-arm64e.deb"
        - "otool -L packaged SpotifyReframe.dylib"
        - "node /Users/chase/.codex/skills/goal-maker/scripts/check-goal-state.mjs docs/goals/spotifyreframe-uikit-polish/state.yaml"
      device_test_checklist:
        - "Refresh Sileo and confirm installed version is 1.2.1-1 or newer."
        - "If AI Home is missing, reset SpotifyReframe preferences or turn Enable Preview and Show AI Launcher on in Settings.app."
        - "Force close and reopen Spotify; verify AI Home appears near upper right and does not auto-open."
        - "Tap AI Home; verify preview opens, close button works, settings button opens the in-app panel, and Spotify remains stable."
      candidate_1_3_0_tasks:
        - "Add a preference/profile migration that forces homePreviewEnabled and homePreviewLauncher true for users upgrading from 1.2.0 unless they have explicitly disabled the whole tweak."
        - "Add launcher placement controls and make placement less likely to overlap Spotify controls."
        - "Polish UIKit preview visuals: album-art placeholders, hero/mini-player depth, reduced-motion-aware fade-only presentation, and improved compact layout."

  - id: T002
    type: judge
    assignee: Judge
    status: done
    objective: "Choose the 1.3.0 polish scope by impact, crash risk, reversibility, and verification strength."
    inputs:
      - "T001 receipt"
    constraints:
      - "Read-only."
      - "Prefer UIKit-only visual improvements."
      - "Reject work that requires SwiftUI, auto-open behavior, or private data scraping."
    expected_output:
      - "Selected 1.3.0 scope."
      - "Deferred items."
      - "Exact Worker allowed_files and verification commands."
    receipt:
      result: done
      decision: "Implement SpotifyReframe 1.3.0 as a UIKit-only polish and reliability release: add a profile migration for visible AI Home defaults, add launcher placement controls, improve preview visual polish/layout, and keep the full preview user-initiated only."
      selected_1_3_0_scope:
        - "Bump profileVersion and migrate missing/stale homePreviewEnabled/homePreviewLauncher defaults to visible for users who installed 1.2.0."
        - "Add launcher placement preference with at least Top Right, Top Left, Lower Right, and Lower Left options."
        - "Polish the UIKit preview with stronger visual hierarchy, richer card surfaces, and low-power/reduce-motion-safe animation behavior."
        - "Update package metadata, PreferenceLoader pane, local repo metadata, and audit evidence."
      deferred_items:
        - "No SwiftUI implementation."
        - "No auto-open on launch."
        - "No real Spotify content extraction until the 1.4.0 planning task."
        - "No private account data, credentials, DRM/payment behavior, or hidden scraping."
      next_allowed_task: T003
      worker_allowed_files:
        - "../../../tweaks/SpotifyReframe"
        - "../../../repo"
        - "../../audit.md"

  - id: T003
    type: worker
    assignee: Worker
    status: done
    objective: "Implement SpotifyReframe 1.3.0 as a UIKit-only reliability and polish release: visible-default migration, launcher placement controls, preview visual polish, and local repo metadata."
    allowed_files:
      - ../../../tweaks/SpotifyReframe
      - ../../../repo
      - ../../audit.md
    verify:
      - "plutil -lint tweaks/SpotifyReframe/Resources/Root.plist tweaks/SpotifyReframe/Resources/Info.plist"
      - "THEOS=/Users/chase/theos make clean package THEOS_PACKAGE_SCHEME=roothide FINALPACKAGE=1 DEBUG=0"
      - "./scripts/package-repo.sh"
      - "./scripts/audit-tweaks.sh"
      - "Inspect packaged SpotifyReframe.dylib with otool -L and confirm no SwiftUI/libswift linkage."
      - "Inspect packaged SpotifyReframe.plist and confirm filter remains com.spotify.client."
      - "Inspect repo/Packages and confirm the new SpotifyReframe version, filename, and SHA256."
    stop_if:
      - "The chosen work requires SwiftUI or libswift in the Spotify dylib."
      - "The chosen work requires auto-opening the preview on launch."
      - "The chosen work requires credentials, account scraping, DRM/payment bypass, or non-UI behavior."
      - "Need files outside allowed_files."
      - "Build or audit fails twice."
    receipt:
      result: done
      changed_files:
        - "tweaks/SpotifyReframe/Tweak.xm"
        - "tweaks/SpotifyReframe/SpotifyUIKitHomePreview.m"
        - "tweaks/SpotifyReframe/Resources/Root.plist"
        - "tweaks/SpotifyReframe/Resources/Info.plist"
        - "tweaks/SpotifyReframe/control"
        - "tweaks/SpotifyReframe/README.md"
        - "repo/debs/com.chasedavis.spotifyreframe_1.3.0-1_iphoneos-arm64e.deb"
        - "repo/Packages"
        - "repo/Packages.gz"
        - "repo/Packages.xz"
        - "repo/Release"
        - "docs/audit.md"
      commands:
        - cmd: "plutil -lint tweaks/SpotifyReframe/Resources/Root.plist tweaks/SpotifyReframe/Resources/Info.plist"
          status: pass
        - cmd: "THEOS=/Users/chase/theos make clean package THEOS_PACKAGE_SCHEME=roothide FINALPACKAGE=1 DEBUG=0"
          status: pass
        - cmd: "./scripts/package-repo.sh"
          status: pass
        - cmd: "./scripts/audit-tweaks.sh"
          status: pass
        - cmd: "ar/tar package inspection + otool -L packaged SpotifyReframe.dylib"
          status: pass
      package:
        version: "1.3.0-1"
        sha256: "2721de3725b19c860ed41cf966b6836af87732d386a05c9b8a095e4b6c78b30e"
      summary: "Implemented 1.3.0 as a UIKit-only reliability/polish release: profileVersion 4 migration recovers AI Home visibility from the hidden-launcher build, launcher placement controls were added, preview visuals gained richer card framing/waveform/detail polish, and preview presentation now respects Low Power Mode/Reduce Motion. Local package inspection confirms com.spotify.client filter and no SwiftUI/libswift linkage."

  - id: T004
    type: judge
    assignee: Judge
    status: done
    objective: "Audit the 1.3.0 release candidate and decide whether it is publishable to gh-pages."
    inputs:
      - "T003 receipt"
      - ../../../repo/Packages
      - ../../audit.md
    constraints:
      - "Read-only."
      - "Require package inspection evidence, not just a successful build."
      - "Block publication if the dylib links SwiftUI/libswift or if package filter changes."
    expected_output:
      - "Publish or block decision."
      - "Required fixes if blocked."
      - "Device-test instructions if publishable."
    receipt:
      result: done
      decision: "publish"
      summary: "SpotifyReframe 1.3.0-1 release candidate is publishable. It builds, passes static audit, repo metadata is updated, packaged filter remains com.spotify.client, packaged dylib links UIKit/Foundation/QuartzCore/CoreGraphics/Substrate only, and SHA256 is recorded in repo/Packages."
      evidence:
        - "git diff --check: pass"
        - "plutil -lint Root.plist Info.plist: pass"
        - "docs/audit.md: SpotifyReframe pass across Roothide, Filter, Package, UI boundary, Deb contents, Prefs, Arch"
        - "repo/Packages: Version 1.3.0-1, SHA256 2721de3725b19c860ed41cf966b6836af87732d386a05c9b8a095e4b6c78b30e"
        - "packaged SpotifyReframe.plist: Filter Bundles com.spotify.client"
        - "packaged otool -L: no SwiftUI/libswift linkage"
      next_allowed_task: T005

  - id: T005
    type: worker
    assignee: Worker
    status: done
    objective: "Publish the approved 1.3.0 package to gh-pages and verify the live Sileo repo serves the matching package."
    allowed_files:
      - ../../../repo
    verify:
      - "git push origin main"
      - "Publish repo/ to gh-pages using a detached worktree."
      - "curl live Packages until the new SpotifyReframe version appears."
      - "Download the live .deb and compare SHA256 with the local repo package."
    stop_if:
      - "T004 does not explicitly approve publication."
      - "GitHub Pages does not serve the new metadata after repeated polling."
      - "Live package hash differs from the local package."
    receipt:
      result: done
      changed_files:
        - "repo/Packages"
        - "repo/Packages.gz"
        - "repo/Packages.xz"
        - "repo/Release"
        - "repo/debs/com.chasedavis.spotifyreframe_1.3.0-1_iphoneos-arm64e.deb"
      commands:
        - cmd: "git push origin main"
          status: pass
          detail: "main d03b0a3..366702e"
        - cmd: "Publish repo/ to gh-pages using detached worktree"
          status: pass
          detail: "gh-pages 0efac5e..37b3cda"
        - cmd: "curl live Packages until Version 1.3.0-1 appeared"
          status: pass
        - cmd: "Download live .deb and compare SHA256 with local repo package"
          status: pass
      live:
        url: "https://chasesdavis.github.io/ios17-tweaks-sileo-repo/"
        package: "debs/com.chasedavis.spotifyreframe_1.3.0-1_iphoneos-arm64e.deb"
        sha256: "2721de3725b19c860ed41cf966b6836af87732d386a05c9b8a095e4b6c78b30e"
      summary: "Published SpotifyReframe 1.3.0-1 to gh-pages and verified the live package byte-matches the local repo package."

  - id: T006
    type: scout
    assignee: Scout
    status: done
    objective: "Draft a safe 1.4.0 integration plan for feeding visible Spotify content into the UIKit preview."
    inputs:
      - "../../../tweaks/SpotifyReframe"
      - "Device feedback from 1.3.0"
    constraints:
      - "Read-only."
      - "Plan only; do not implement."
      - "Avoid private account data, credentials, DRM/payment behavior, or hidden scraping."
      - "Prefer visible on-screen labels/artwork already rendered by Spotify."
    expected_output:
      - "Safe integration candidates."
      - "Risks and fallback behavior."
      - "Proposed 1.4.0 task board additions."
    receipt:
      result: done
      note: "notes/T006-safe-1.4.0-integration-plan.md"
      summary: "Drafted a safe 1.4.0 integration plan based only on foreground visible UILabel/UIImageView content at user-initiated preview open time. The plan rejects network/API/account/cache/token/model access, persistence, background polling, DRM/payment behavior, and hidden/offscreen data."
      proposed_next_scope:
        - "Optional visible-content snapshot provider, default off."
        - "UIKit preview accepts nullable snapshot and falls back to static mock content."
        - "Hard caps on traversal and no persistence."
        - "Package gates for no SwiftUI/libswift, com.spotify.client filter, and no network/filesystem/account APIs."

  - id: T007
    type: pm
    assignee: PM
    status: done
    objective: "Close the tranche with a compact release and handoff summary."
    inputs:
      - "T001-T006 receipts"
    constraints:
      - "Do not mark the goal done unless audit, publish, and live repo verification are complete or explicitly blocked."
    expected_output:
      - "Release summary."
      - "Remaining risks."
      - "Next recommended /goal."
    receipt:
      result: done
      decision: complete
      release_summary: "SpotifyReframe 1.3.0-1 shipped as a UIKit-only polish/reliability release. It adds profileVersion 4 migration for visible AI Home defaults, launcher placement controls, richer preview visuals, and Low Power/Reduce Motion-safe preview presentation."
      completion_evidence:
        - "T001 Scout mapped implementation, verification commands, device-test risks, and candidate 1.3.0 tasks."
        - "T002 Judge selected the bounded 1.3.0 UIKit-only scope and deferred real Spotify content to 1.4.0 planning."
        - "T003 Worker implemented and locally packaged SpotifyReframe 1.3.0-1; package SHA256 2721de3725b19c860ed41cf966b6836af87732d386a05c9b8a095e4b6c78b30e."
        - "T004 Judge approved publish based on diff/plist checks, docs/audit.md, repo/Packages, packaged filter inspection, and otool linkage inspection."
        - "T005 Worker published gh-pages and verified the live package byte-matches the local package."
        - "T006 Scout wrote notes/T006-safe-1.4.0-integration-plan.md for a future visible-content integration."
      remaining_risks:
        - "Final visual/positioning quality still needs on-device review across Spotify Home, Search, Library, and Now Playing."
        - "The 1.4.0 visible-content plan is intentionally unimplemented and should remain opt-in/default-off when pursued."
      next_recommended_goal: "/goal Follow docs/goals/spotifyreframe-uikit-polish/goal.md is complete; next create or run a new 1.4.0 visible-content integration goal after device feedback on 1.3.0."

checks:
  dirty_fingerprint: unknown
  last_verification:
    result: pass
    task: T007
    commands:
      - "git diff --check"
      - "plutil -lint tweaks/SpotifyReframe/Resources/Root.plist tweaks/SpotifyReframe/Resources/Info.plist"
      - "./scripts/audit-tweaks.sh"
      - "curl live Packages and compare live .deb SHA256"
