version: 2

goal:
  slug: islandhub-mvp
  title: IslandHub MVP
  kind: specific
  tranche: "Build and publish IslandHub v1 core overlay and preferences."
  status: done

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true

agents:
  scout: installed
  worker: installed
  judge: installed

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    objective: "Map existing tweak/repo patterns and identify constraints for IslandHub."
    inputs:
      - AGENTS.md
      - shared/
      - scripts/package-repo.sh
      - existing tweak Makefiles and preference bundles
    constraints:
      - "Read-only task."
      - "Do not revert pending IslandInbox artifacts."
    expected_output:
      - "Patterns to reuse"
      - "Risks and scope boundaries"
    receipt:
      result: done
      summary: "Found reusable roothide Theos and PreferenceLoader patterns in existing tweaks. Existing pending IslandInbox artifacts must be preserved. IslandHub v1 should be SpringBoard-only and UI/UX-only, with safe local data such as battery state and user-triggered clipboard inspection."
      evidence:
        - AGENTS.md
        - shared/CDPremiumPrefsListController.m
        - shared/CDPremiumTweakKit.h
        - scripts/package-repo.sh
        - tweaks/IslandInbox/
      spawned_tasks:
        - T002
  - id: T002
    type: worker
    assignee: Worker
    status: done
    objective: "Implement IslandHub v1 source, preferences, package metadata, and README."
    allowed_files:
      - tweaks/IslandHub/**
      - docs/goals/islandhub-mvp/state.yaml
      - .workflow/islandhub-mvp/**
    verify:
      - "plutil -lint on generated plists"
      - "Theos roothide package build"
    stop_if:
      - "Implementation requires private account, credential, payment, or destructive behavior."
      - "Need to modify existing unrelated tweak source."
      - "Build fails twice with the same unresolved issue."
    receipt:
      result: done
      changed_files:
        - tweaks/IslandHub/Makefile
        - tweaks/IslandHub/control
        - tweaks/IslandHub/IslandHub.plist
        - tweaks/IslandHub/Tweak.xm
        - tweaks/IslandHub/README.md
        - tweaks/IslandHub/Resources/Info.plist
        - tweaks/IslandHub/Resources/Root.plist
        - tweaks/IslandHub/layout/Library/PreferenceLoader/Preferences/IslandHubPrefs.plist
      commands:
        - cmd: "plutil -lint tweaks/IslandHub/IslandHub.plist tweaks/IslandHub/Resources/Info.plist tweaks/IslandHub/Resources/Root.plist tweaks/IslandHub/layout/Library/PreferenceLoader/Preferences/IslandHubPrefs.plist"
          status: pass
        - cmd: "THEOS=/Users/chase/theos make clean package THEOS_PACKAGE_SCHEME=roothide FINALPACKAGE=1 DEBUG=0"
          status: pass
      summary: "Implemented IslandHub v1 as a SpringBoard overlay with compact/expanded Island UI, priority cards, gestures, theme controls, module toggles, battery card, and user-triggered clipboard inspection."
  - id: T003
    type: worker
    assignee: Worker
    status: done
    objective: "Package IslandHub into the local Sileo repo while preserving existing IslandInbox artifacts."
    allowed_files:
      - repo/**
      - docs/audit.md
      - docs/goals/islandhub-mvp/state.yaml
      - .workflow/islandhub-mvp/**
    verify:
      - "scripts/package-repo.sh"
      - "scripts/audit-tweaks.sh"
      - "focused deb inspection"
    stop_if:
      - "Repo metadata would reference a missing deb."
      - "Audit detects unsafe package filters or broken metadata."
    receipt:
      result: done
      changed_files:
        - repo/debs/com.chasedavis.islandhub_1.0.0-1_iphoneos-arm64e.deb
        - repo/Packages
        - repo/Packages.gz
        - repo/Packages.xz
        - repo/Release
        - docs/audit.md
      commands:
        - cmd: "./scripts/package-repo.sh"
          status: pass
        - cmd: "./scripts/audit-tweaks.sh"
          status: pass
        - cmd: "focused IslandHub deb inspection"
          status: pass
        - cmd: "verify all repo/Packages Filename entries exist"
          status: pass
      summary: "Packaged IslandHub 1.0.0-1, regenerated repo metadata, preserved existing IslandInbox package metadata, and verified SpringBoard-only filter plus installed preference files."
  - id: T004
    type: worker
    assignee: Worker
    status: done
    objective: "Commit, push, publish gh-pages, and verify live Sileo package bytes."
    allowed_files:
      - "*"
    verify:
      - "git status review"
      - "live Packages contains IslandHub 1.0.0-1"
      - "hosted deb SHA256 matches local deb"
    stop_if:
      - "GitHub push fails repeatedly."
      - "Live repo cannot be verified after polling window."
    receipt:
      result: done
      changed_files:
        - "main branch"
        - "gh-pages branch"
      commands:
        - cmd: "git push origin main"
          status: pass
        - cmd: "git push origin HEAD:gh-pages"
          status: pass
        - cmd: "live IslandHub deb SHA256 compare"
          status: pass
      summary: "Pushed main at f9104b3 and published gh-pages at d793b6d. Live IslandHub 1.0.0-1 deb matched local bytes."
      evidence:
        - "IslandHub SHA256 cb59463f6def7eff598a5a2cab2562f4f2daefb73b237dfe6b6a3061dbbb368a"
  - id: T999
    type: judge
    assignee: Judge
    status: done
    objective: "Audit whether the current tranche is complete."
    inputs:
      - "All done task receipts"
      - "Last build and live repo verification"
      - "Current git status"
    expected_output:
      - "complete | not_complete"
      - "missing evidence"
      - "next task if not complete"
    receipt:
      result: done
      decision: complete
      summary: "The current tranche is complete: IslandHub source exists, roothide package builds, local and live package audits pass, Sileo repo metadata includes IslandHub 1.0.0-1, and hosted bytes match the local deb."
      remaining_risks:
        - "Real notification capture, AI, media, privacy sensor, command toggles, and business integrations are intentionally deferred to later UI-reviewed tranches."
        - "On-device visual fit still needs user testing across Dynamic Island and notched layouts."

checks:
  dirty_fingerprint: clean-before-final-receipt-commit
  last_verification:
    result: pass
    task: T004
    commands:
      - "plutil -lint IslandHub plists"
      - "Theos roothide build"
      - "./scripts/audit-tweaks.sh"
      - "focused IslandHub deb inspection"
      - "live IslandHub deb SHA256 compare"
