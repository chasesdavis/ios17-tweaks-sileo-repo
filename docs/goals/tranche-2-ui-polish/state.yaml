version: 2
goal: tranche-2-ui-polish
tasks:
  - id: T001
    type: judge
    assignee: Judge
    status: active
    objective: "Select the next 6-8 ideas by impact, feasibility, crash risk, and overlap with tranche 1."
    inputs:
      - ../../ideas.md
      - ../../audit.md
      - ../device-test-tranche-1/state.yaml
    constraints:
      - "Read-only task."
    expected_output:
      - "A ranked tranche 2 selection with implementation notes."
    receipt: null
  - id: T002
    type: worker
    assignee: Worker
    status: queued
    objective: "Implement the approved tranche 2 tweaks and update the local repo."
    allowed_files:
      - tweaks
      - repo
      - docs/ideas.md
      - docs/audit.md
      - scripts
    verify:
      - "./scripts/build-all.sh"
      - "./scripts/package-repo.sh"
      - "./scripts/audit-tweaks.sh"
    stop_if:
      - "A selected tweak requires non-UI behavior."
      - "Private API class assumptions cannot be made defensive."
      - "Build fails twice."
    receipt: null
